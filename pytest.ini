# ==========================================
# pytest.ini - Pytest Configuration File
# ==========================================
# All custom options use the "--my-" prefix to avoid
# conflicts with the pytest-playwright plugin.
# ==========================================

[pytest]

addopts =
    # ------------------------------
    # Plugin Management
    # ------------------------------
    # Disable pytest-playwright plugin's fixtures and CLI options.
    # The playwright library (sync_playwright, etc.) still works fine.
    # This prevents any hidden conflicts with our custom fixtures.
    -p no:playwright

    # ------------------------------
    # General Options
    # ------------------------------
    -v
    --my-browser=chromium
    --my-headed
    #--my-base-url=http://localhost/opencart/upload/
    --my-base-url=https://tutorialsninja.com/demo/
    #--my-base-url=https://naveenautomationlabs.com/opencart

    # ------------------------------
    # Captures and Reports (Debugging)
    # ------------------------------
    --my-video=retain-on-failure
    #--my-video=on
    --my-screenshot=only-on-failure
    #--my-screenshot=on
    --my-tracing=retain-on-failure
    #--my-tracing=on
    --html=reports/myreport.html --self-contained-html --capture=tee-sys
    --alluredir=reports/allure-results

    # ------------------------------
    # Parallel Execution
    # ------------------------------
    #-n=1
    #--numprocesses=2

    # ------------------------------
    # Test Grouping (Markers)
    # ------------------------------
    # Use one of the below commands when running pytest:
     -m "sanity"
;     -m "regression"
    # -m "sanity or regression"
    # -m "sanity and regression"
    # -m "sanity and not regression"
    # -m "regression and not sanity"

    #-m "sanity or regression"
    #-m "datadriven"
    #-m "end_to_end"

    # ------------------------------
    # Flaky Test Handling
    # ------------------------------
    #--reruns 2
    #--reruns-delay 2


# ------------------------------
# Custom Markers
# ------------------------------
markers =
    sanity: marks a sanity test (basic quick check)
    regression: marks a regression test (full end-to-end validation)
    datadriven: marks a datadriven test
    end_to_end: marks an end-to-end test